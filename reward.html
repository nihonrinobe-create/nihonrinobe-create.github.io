<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>е ұй…¬зўәиӘҚгғқгғјгӮҝгғ«</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
:root{--bg:#eef0f4;--card:#fff;--hdr:#161b26;--hdr2:#1e2536;--text:#161b26;--text2:#3d4663;--muted:#7c839a;--inv:#fff;--lbl:#555d78;--border:#d8dce6;--focus:#3b6df0;--accent:#3b6df0;--accent-h:#2d57c7;--green:#0a8a5e;--amber:#c27a00;--red:#c93030;--shadow:0 1px 3px rgba(0,0,0,.05);--r:10px;--rlg:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace;font-feature-settings:'zero' 1}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* Login */
#loginView{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(160deg,#161b26,#232b3e 40%,#1a2030)}
.lcard{width:100%;max-width:400px;background:var(--card);border-radius:var(--rlg);box-shadow:0 8px 30px rgba(0,0,0,.12);overflow:hidden;animation:fadeUp .4s ease both}
.lcard-hdr{background:var(--hdr);padding:28px 26px 24px;text-align:center;border-bottom:3px solid var(--accent)}.lcard-hdr h1{color:var(--inv);font-size:1.2rem;font-weight:700;letter-spacing:.05em}.lcard-hdr .sub{color:rgba(255,255,255,.3);font-size:.75rem;margin-top:3px;letter-spacing:.1em;text-transform:uppercase}
.lform{padding:26px}.fld{margin-bottom:16px}.fld label{display:block;font-size:.85rem;font-weight:500;color:var(--lbl);margin-bottom:5px}.fld input,.fld select{width:100%;padding:12px;font-size:1.05rem;font-family:inherit;background:#f5f6f9;border:1.5px solid var(--border);border-radius:var(--r);outline:none;transition:border .2s}.fld input:focus,.fld select:focus{border-color:var(--focus);box-shadow:0 0 0 3px rgba(59,109,240,.1)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 24px;font-family:inherit;font-size:1rem;font-weight:600;border:none;border-radius:var(--r);cursor:pointer;transition:all .2s}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{width:100%;background:var(--accent);color:#fff}.btn-p:hover:not(:disabled){background:var(--accent-h)}
.btn-s{background:#f5f6f9;color:var(--text2);font-size:.88rem;padding:9px 16px}.btn-s:hover:not(:disabled){background:var(--border)}
.btn-g{background:transparent;color:rgba(255,255,255,.5);font-size:.85rem;padding:7px 12px}.btn-g:hover:not(:disabled){color:#fff;background:rgba(255,255,255,.08)}
.lerr{display:none;margin-top:12px;padding:10px;background:#fef0f0;color:var(--red);border-radius:var(--r);font-size:.88rem;text-align:center}.lerr.on{display:block}

/* App */
#appView{display:none}
.topbar{background:var(--hdr);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:2px solid rgba(59,109,240,.3)}.topbar h2{color:var(--inv);font-size:1rem;font-weight:600}.topbar .meta{color:rgba(255,255,255,.35);font-size:.78rem}.topbar-r{display:flex;gap:5px}
.wrap{max-width:1000px;margin:0 auto;padding:16px 12px 60px}

.ctrl-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.ctrl-bar label{font-size:.88rem;font-weight:500;color:var(--lbl)}
.ctrl-bar input[type="date"],.ctrl-bar select{font-family:inherit;font-size:1rem;font-weight:600;padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--text);cursor:pointer;outline:none}
.date-range{font-size:.82rem;color:var(--muted);padding:4px 12px;background:var(--card);border-radius:20px;border:1px solid var(--border)}
.admin-badge{font-size:.72rem;background:var(--accent);color:#fff;padding:2px 9px;border-radius:10px;font-weight:600;margin-left:6px}

.tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--border);border-radius:var(--r);padding:3px;overflow-x:auto}.tab{flex:1;min-width:0;padding:10px 14px;font-size:.88rem;font-weight:600;text-align:center;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:7px;transition:all .2s;white-space:nowrap}.tab.active{background:var(--card);color:var(--accent);box-shadow:var(--shadow)}.tab:hover:not(.active){color:var(--text2)}

.summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:16px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--rlg);padding:14px;box-shadow:var(--shadow)}.scard .sl{font-size:.78rem;color:var(--muted);font-weight:500;margin-bottom:4px}.scard .sv{font-size:1.25rem;font-weight:700}

/* Week (PC table) */
.week{background:var(--card);border:1px solid var(--border);border-radius:var(--rlg);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);animation:fadeUp .3s ease both}
.week-hdr{padding:12px 16px;background:var(--hdr2);color:var(--inv)}.week-hdr h3{font-size:.92rem;font-weight:600;margin-bottom:4px}.week-tf{font-size:1.1rem;font-weight:700}.week-tf .lb{font-size:.72rem;font-weight:400;opacity:.5;margin-right:5px}.week-tf .op{opacity:.4;margin:0 4px}
.tbl-w{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.88rem}thead th{background:#f0f2f6;color:var(--lbl);font-weight:600;font-size:.78rem;padding:9px 10px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}tbody td{padding:8px 10px;border-bottom:1px solid #f0f2f5}.r{text-align:right}.total-row td{font-weight:700;background:#f7f8fb;border-top:2px solid var(--border)}.neg{color:var(--red)}.pos{color:var(--green)}tbody tr:hover{background:#f7f8fb}
.empty-w{padding:24px;text-align:center;color:var(--muted);font-size:.9rem}
.app-err{color:var(--red);font-size:.88rem;padding:6px 0}

/* Mobile card layout */
.day-cards{display:none;padding:8px;flex-direction:column;gap:8px}
.day-card{background:#f8f9fc;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.day-card.has-data{background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.day-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.day-date{font-weight:600;font-size:.95rem}
.day-count{font-size:.82rem;color:var(--muted);margin-left:8px}
.day-reward{font-size:1.15rem;font-weight:700}
.day-reward.pos{color:var(--green)}.day-reward.neg{color:var(--red)}
.day-details{display:grid;grid-template-columns:1fr 1fr;gap:3px 16px}
.day-item{display:flex;justify-content:space-between;font-size:.85rem;padding:2px 0}.day-item .dl{color:var(--muted)}.day-item .dv{font-weight:500}
.day-empty{text-align:center;color:var(--muted);font-size:.82rem;padding:4px 0}
.day-card.total{background:var(--hdr);color:var(--inv);border-color:var(--hdr)}
.day-card.total .day-date,.day-card.total .dv{color:var(--inv)}.day-card.total .day-count,.day-card.total .dl{color:rgba(255,255,255,.5)}

/* Referral detail cards (mobile) */
.ref-body-cards{display:none;padding:8px;flex-direction:column;gap:8px}
.ref-card{background:#f8f9fc;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.ref-name{font-weight:600;font-size:.92rem;margin-bottom:6px}
.ref-weeks{display:grid;grid-template-columns:1fr 1fr;gap:3px 16px}
.ref-week{display:flex;justify-content:space-between;font-size:.85rem}.ref-week .dl{color:var(--muted)}
.ref-total{display:flex;justify-content:space-between;font-size:.95rem;font-weight:700;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}

.loading{display:none;position:fixed;inset:0;background:rgba(238,240,244,.75);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(2px)}.loading.on{display:flex}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--hdr);color:#fff;padding:10px 20px;border-radius:var(--r);font-size:.88rem;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.12);z-index:10000;opacity:0;transition:all .3s;pointer-events:none}.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* Mobile */
@media(max-width:640px){
  html{font-size:14px}
  .summary{grid-template-columns:1fr 1fr;gap:6px}.scard{padding:10px 12px}.scard .sv{font-size:1.1rem}
  .ctrl-bar{flex-direction:column;gap:6px}
  /* Hide table, show cards */
  .tbl-w{display:none!important}
  .day-cards{display:flex!important}
  .ref-tbl-w{display:none!important}
  .ref-body-cards{display:flex!important}
  .week-hdr h3{font-size:.88rem}
}
</style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<div id="loginView"><div class="lcard"><div class="lcard-hdr"><h1>е ұй…¬зўәиӘҚгғқгғјгӮҝгғ«</h1><div class="sub">Compensation Portal</div></div>
<div class="lform"><div class="fld"><label>жӢ…еҪ“иҖ…з•ӘеҸ·</label><input id="staffId" inputmode="numeric" autocomplete="username" placeholder="дҫӢ: 0001"></div>
<div class="fld"><label>PIN</label><input id="pin" type="password" class="mono" inputmode="numeric" autocomplete="current-password" maxlength="11" placeholder="йӣ»и©ұз•ӘеҸ·гҒҫгҒҹгҒҜPIN"></div>
<button class="btn btn-p" id="loginBtn" onclick="doLogin()">гғӯгӮ°гӮӨгғі</button><div class="lerr" id="loginErr"></div></div></div></div>

<div id="appView">
<div class="topbar"><div><h2>е ұй…¬зўәиӘҚгғқгғјгӮҝгғ«</h2><div class="meta" id="lblUser"></div></div><div class="topbar-r"><button class="btn btn-g" onclick="doLogout()">гғӯгӮ°гӮўгӮҰгғҲ</button></div></div>
<div class="wrap">
  <div class="ctrl-bar">
    <label>й–Ӣе§Ӣж—Ҙ</label><input type="date" id="startDate">
    <div id="adminSelect" style="display:none"><label>еҜҫиұЎ</label><select id="memberSelect" onchange="onMemberChange()"></select></div>
    <button class="btn btn-s" id="dateBtn" onclick="reload()">иЎЁзӨәжӣҙж–°</button>
    <span class="date-range" id="dateRange"></span>
  </div>
  <div class="tabs" id="tabBar"></div>
  <div class="summary" id="summaryArea"></div>
  <div id="weeksArea"></div>
  <p class="app-err" id="appErr"></p>
</div></div>

<script>
var GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyX6aH_48g_SNMYlrcTWcUAG3LA--YmibrDNDId6RSWtBCR53kKbaH4qwH4qdFSZd-7lg/exec';
var token='',busy=false,seq=0,latest=0,ua=navigator.userAgent||'';
var currentData=null,activeTab='own',isAdmin=false,myStaffId='',viewStaffId='';

(function(){$('pin').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});$('staffId').addEventListener('keydown',function(e){if(e.key==='Enter')$('pin').focus()})})();

async function callApi(payload){
  var json=JSON.stringify(payload);
  var encoded=btoa(unescape(encodeURIComponent(json)));
  var url=GAS_API_URL+'?_portal_data='+encodeURIComponent(encoded);
  var resp=await fetch(url,{redirect:'follow'});
  var text=await resp.text();
  try{return JSON.parse(text)}catch(e){throw new Error('гӮөгғјгғҗгғјгҒӢгӮүгҒ®еҝңзӯ”гҒҢдёҚжӯЈгҒ§гҒҷгҖӮгғҮгғ—гғӯгӮӨгӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ')}
}

function $(id){return document.getElementById(id)}
function yen(n){return'ВҘ'+Number(n||0).toLocaleString('ja-JP')}
function esc(s){var d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML}
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},2500)}
function fmtMD(s){if(!s)return'-';var p=s.split('-');return parseInt(p[1])+'/'+parseInt(p[2])}
function colorVal(n){if(n<0)return'<span class="neg mono">'+yen(n)+'</span>';if(n>0)return'<span class="pos mono">'+yen(n)+'</span>';return'<span class="mono">ВҘ0</span>'}
function colorCls(n){return n<0?'neg':n>0?'pos':''}
function setBusy(f){busy=!!f;['loginBtn','dateBtn'].forEach(function(id){var e=$(id);if(e)e.disabled=!!f})}

async function doLogin(){
  if(busy)return;var sid=$('staffId').value.trim(),p=$('pin').value.trim();$('loginErr').classList.remove('on');
  if(!sid||!p){$('loginErr').textContent='жӢ…еҪ“иҖ…з•ӘеҸ·гҒЁPINгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„';$('loginErr').classList.add('on');return}
  setBusy(true);$('loginBtn').textContent='гғӯгӮ°гӮӨгғідёӯ...';$('loading').classList.add('on');
  try{
    var r=await callApi({action:'login',staffId:sid,pin:p,ua:ua});
    $('loading').classList.remove('on');setBusy(false);$('loginBtn').textContent='гғӯгӮ°гӮӨгғі';
    if(r&&r.ok){token=r.sessionToken;myStaffId=r.staffId;viewStaffId=r.staffId;
      $('lblUser').textContent=r.displayName+'пјҲ'+r.staffId+'пјү';
      $('loginView').style.display='none';$('appView').style.display='block';bootstrap()}
    else{$('loginErr').textContent=(r&&r.error)||'еӨұж•—';$('loginErr').classList.add('on');$('pin').value='';$('pin').focus()}
  }catch(e){
    $('loading').classList.remove('on');setBusy(false);$('loginBtn').textContent='гғӯгӮ°гӮӨгғі';
    $('loginErr').textContent=e.message||'йҖҡдҝЎгӮЁгғ©гғј';$('loginErr').classList.add('on');$('pin').value='';$('pin').focus();
  }
}

async function bootstrap(){
  if(!token||busy)return;var s=++seq;latest=s;setBusy(true);$('loading').classList.add('on');$('appErr').textContent='';
  try{
    var r=await callApi({action:'bootstrap',sessionToken:token,startDate:null,ua:ua});
    if(s!==latest)return;$('loading').classList.remove('on');setBusy(false);
    if(!r||!r.ok){handleErr(r&&r.error);return}
    currentData=r;isAdmin=r.isAdmin||false;
    $('startDate').value=r.startDate;updateDateRange(r.startDate);
    if(isAdmin&&r.allMembers){$('adminSelect').style.display='';var sel=$('memberSelect');sel.innerHTML='';
      r.allMembers.forEach(function(m){var o=document.createElement('option');o.value=m.staffId;o.textContent=m.staffId+' '+m.name;sel.appendChild(o)});sel.value=myStaffId;
      $('lblUser').innerHTML=r.displayName+'пјҲ'+r.staffId+'пјү<span class="admin-badge">з®ЎзҗҶиҖ…</span>';}
    buildTabs();renderOwn();
  }catch(e){if(s!==latest)return;$('loading').classList.remove('on');setBusy(false);handleErr(e.message)}
}

async function reload(){
  if(!token||busy)return;var s=++seq;latest=s;setBusy(true);$('loading').classList.add('on');$('appErr').textContent='';
  var target=isAdmin?$('memberSelect').value:null;
  try{
    var r=await callApi({action:'changeDate',sessionToken:token,startDate:$('startDate').value,targetStaffId:target,ua:ua});
    if(s!==latest)return;$('loading').classList.remove('on');setBusy(false);
    if(!r||!r.ok){handleErr(r&&r.error);return}
    currentData.weeks=r.weeks;currentData.referrees=r.referrees;currentData.referralReward=r.referralReward;
    if(r.viewStaffId)viewStaffId=r.viewStaffId;
    $('startDate').value=r.startDate;updateDateRange(r.startDate);
    if(activeTab==='own')renderOwn();
  }catch(e){if(s!==latest)return;$('loading').classList.remove('on');setBusy(false);handleErr(e.message)}
}

function onMemberChange(){reload()}

async function loadReferreeDetail(refId){
  if(!token||busy)return;var s=++seq;latest=s;setBusy(true);$('loading').classList.add('on');
  $('summaryArea').innerHTML='';$('weeksArea').innerHTML='';
  try{
    var r=await callApi({action:'viewReferree',sessionToken:token,referreeStaffId:refId,startDate:$('startDate').value,ua:ua});
    if(s!==latest)return;$('loading').classList.remove('on');setBusy(false);
    if(!r||!r.ok){handleErr(r&&r.error);return}
    $('summaryArea').innerHTML='<div class="scard" style="grid-column:1/-1"><div class="sl">иў«зҙ№д»ӢиҖ…</div><div class="sv">'+esc(r.refName)+'гҒ®жҳҺзҙ°</div></div>';
    $('weeksArea').innerHTML=r.weeks?renderWeeksHTML(r.weeks,true,null):'<div class="empty-w">гғҮгғјгӮҝгҒӘгҒ—</div>';
  }catch(e){if(s!==latest)return;$('loading').classList.remove('on');setBusy(false);handleErr(e.message)}
}

async function doLogout(){
  if(busy)return;setBusy(true);$('loading').classList.add('on');
  try{await callApi({action:'logout',sessionToken:token,ua:ua})}catch(e){}
  $('loading').classList.remove('on');setBusy(false);resetLogin();
}

function updateDateRange(start){if(!start)return;var s=new Date(start),e=new Date(s.getTime()+27*86400000);
  var days=['ж—Ҙ','жңҲ','зҒ«','ж°ҙ','жңЁ','йҮ‘','еңҹ'];var f=function(d){return(d.getMonth()+1)+'/'+d.getDate()+'пјҲ'+days[d.getDay()]+'пјү'};
  $('dateRange').textContent=f(s)+'гҖң'+f(e)+'гҖҖ4йҖұеҲҶ'}

function buildTabs(){var bar=$('tabBar');bar.innerHTML='';
  bar.appendChild(mkTab('own','иҮӘеҲҶгҒ®е ұй…¬'));
  if(currentData.referrees&&currentData.referrees.length)currentData.referrees.forEach(function(r){bar.appendChild(mkTab('detail_'+r.staffId,r.name+'гҒ®жҳҺзҙ°'))});
  activateTab('own')}

function mkTab(id,label){var b=document.createElement('button');b.className='tab';b.textContent=label;b.dataset.tab=id;b.onclick=function(){activateTab(id)};return b}
function activateTab(id){activeTab=id;document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===id)});
  if(id==='own')renderOwn();else if(id.indexOf('detail_')===0)loadReferreeDetail(id.replace('detail_',''))}

function renderOwn(){
  if(!currentData||!currentData.weeks){$('weeksArea').innerHTML='<div class="empty-w">гғҮгғјгӮҝгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div>';$('summaryArea').innerHTML='';return}
  var weeks=currentData.weeks,tT=0,tS=0,tA=0,tR=0;
  weeks.forEach(function(w){tT+=w.transferAmount;tS+=w.totals.sales;tA+=w.totals.adCost;tR+=w.totals.reward});
  var rr=currentData.referralReward,refTotal=rr?rr.total:0;
  var hasRef=refTotal>0||(currentData.referrees&&currentData.referrees.length>0);

  var sm='<div class="scard"><div class="sl">е ұй…¬еҗҲиЁҲ</div><div class="sv mono">'+yen(tR)+'</div></div>';
  if(hasRef){
    sm+='<div class="scard"><div class="sl">зҙ№д»ӢиҖ…е ұй…¬</div><div class="sv mono" style="color:var(--green)">'+yen(refTotal)+'</div></div>';
    sm+='<div class="scard"><div class="sl">жңҖзөӮеҗҲиЁҲпјҲжҢҜиҫјпјү</div><div class="sv mono" style="color:var(--accent)">'+yen(tR+refTotal)+'</div></div>';
  }else{
    sm+='<div class="scard"><div class="sl">жҢҜиҫјеҗҲиЁҲ</div><div class="sv mono" style="color:var(--accent)">'+yen(tT)+'</div></div>';
  }
  sm+='<div class="scard"><div class="sl">еЈІдёҠеҗҲиЁҲ</div><div class="sv mono" style="color:var(--green)">'+yen(tS)+'</div></div>';
  sm+='<div class="scard"><div class="sl">еәғе‘ҠиІ»еҗҲиЁҲ</div><div class="sv mono" style="color:var(--amber)">'+yen(tA)+'</div></div>';
  $('summaryArea').innerHTML=sm;

  var refByWeek=rr?rr.byWeek:[0,0,0,0];
  var html=renderWeeksHTML(weeks,true,refByWeek);

  // зҙ№д»ӢиҖ…е ұй…¬еҶ…иЁі
  if(hasRef&&rr&&rr.byRef&&rr.byRef.length){
    html+='<div class="week"><div class="week-hdr"><h3>зҙ№д»ӢиҖ…е ұй…¬ еҶ…иЁі</h3><div class="week-tf"><span class="lb">еҗҲиЁҲ</span><span class="mono">'+yen(refTotal)+'</span></div></div>';
    // PC: table
    html+='<div class="tbl-w"><table><thead><tr><th>иў«зҙ№д»ӢиҖ…</th><th class="r">з¬¬1йҖұ</th><th class="r">з¬¬2йҖұ</th><th class="r">з¬¬3йҖұ</th><th class="r">з¬¬4йҖұ</th><th class="r">еҗҲиЁҲ</th></tr></thead><tbody>';
    rr.byRef.forEach(function(r){html+='<tr><td>'+esc(r.name)+'</td>';r.weekCounts.forEach(function(c){html+='<td class="r mono">'+c+'д»¶ / '+yen(c*3000)+'</td>'});html+='<td class="r mono" style="font-weight:700">'+yen(r.total)+'</td></tr>'});
    html+='</tbody></table></div>';
    // Mobile: cards
    html+='<div class="ref-body-cards">';
    rr.byRef.forEach(function(r){
      html+='<div class="ref-card"><div class="ref-name">'+esc(r.name)+'</div><div class="ref-weeks">';
      r.weekCounts.forEach(function(c,wi){html+='<div class="ref-week"><span class="dl">з¬¬'+(wi+1)+'йҖұ</span><span class="dv mono">'+c+'д»¶ / '+yen(c*3000)+'</span></div>'});
      html+='</div><div class="ref-total"><span>еҗҲиЁҲ</span><span class="mono">'+yen(r.total)+'</span></div></div>';
    });
    html+='</div></div>';
  }
  $('weeksArea').innerHTML=html}

function renderWeeksHTML(weeks,full,refByWeek){var html='';
  weeks.forEach(function(w,i){var ws=fmtMD(w.weekStart),we=fmtMD(w.weekEnd);var d0=w.days[0],d6=w.days[6];
    var refAmt=(refByWeek&&refByWeek[i])?refByWeek[i]:0;

    // Week header
    html+='<div class="week" style="animation-delay:'+(i*0.04)+'s"><div class="week-hdr"><h3>з¬¬'+(i+1)+'йҖұгҖҖ'+ws+'пјҲ'+(d0?d0.dow:'')+'пјүгҖң'+we+'пјҲ'+(d6?d6.dow:'')+'пјү</h3><div class="week-tf">';
    if(refAmt){html+='<span class="lb">е ұй…¬</span><span class="mono">'+yen(w.transferAmount)+'</span>'
      +'<span class="op">+</span><span class="lb">зҙ№д»Ӣ</span><span class="mono" style="color:#34d399">'+yen(refAmt)+'</span>'
      +'<span class="op">=</span><span class="lb">еҗҲиЁҲ</span><span class="mono">'+yen(w.transferAmount+refAmt)+'</span>';}
    else{html+='<span class="lb">жҢҜиҫј</span><span class="mono">'+yen(w.transferAmount)+'</span>';}
    html+='</div></div>';

    if(w.totals.count===0&&w.transferAmount===0&&!refAmt){html+='<div class="empty-w">гҒ“гҒ®йҖұгҒ®гғҮгғјгӮҝгҒҜгҒҫгҒ гҒӮгӮҠгҒҫгҒӣгӮ“</div></div>';return}

    // PC: table
    html+='<div class="tbl-w"><table><thead><tr><th>ж—Ҙд»ҳ</th><th>д»¶ж•°</th><th class="r">еЈІдёҠ</th><th class="r">еәғе‘ҠиІ»</th>';
    if(full)html+='<th class="r">жүӢж•°ж–ҷ</th><th class="r">COиІ»з”Ё</th><th class="r">жң¬дҪ“д»Ј</th><th class="r">дјқзҘЁд»Ј</th>';
    html+='<th class="r">е ұй…¬</th></tr></thead><tbody>';
    w.days.forEach(function(d){html+='<tr><td>'+fmtMD(d.date)+'пјҲ'+esc(d.dow)+'пјү</td><td>'+d.count+'</td><td class="r mono">'+yen(d.sales)+'</td><td class="r mono">'+yen(d.adCost)+'</td>';
      if(full)html+='<td class="r mono">'+yen(d.cardFee)+'</td><td class="r mono">'+yen(d.coFee||0)+'</td><td class="r mono">'+yen(d.honntai)+'</td><td class="r mono">'+yen(d.slipCost)+'</td>';
      html+='<td class="r">'+colorVal(d.reward)+'</td></tr>'});
    var t=w.totals;html+='<tr class="total-row"><td>еҗҲиЁҲ</td><td>'+t.count+'</td><td class="r mono">'+yen(t.sales)+'</td><td class="r mono">'+yen(t.adCost)+'</td>';
    if(full)html+='<td class="r mono">'+yen(t.cardFee)+'</td><td class="r mono">'+yen(t.coFee||0)+'</td><td class="r mono">'+yen(t.honntai)+'</td><td class="r mono">'+yen(t.slipCost)+'</td>';
    html+='<td class="r">'+colorVal(t.reward)+'</td></tr></tbody></table></div>';

    // Mobile: cards
    html+='<div class="day-cards">';
    w.days.forEach(function(d){
      var hasD=d.count>0||d.sales!==0||d.adCost!==0||d.reward!==0;
      html+='<div class="day-card'+(hasD?' has-data':'')+'"><div class="day-top"><div><span class="day-date">'+fmtMD(d.date)+'пјҲ'+esc(d.dow)+'пјү</span><span class="day-count">'+d.count+'д»¶</span></div><div class="day-reward '+colorCls(d.reward)+' mono">'+yen(d.reward)+'</div></div>';
      if(hasD&&full){html+='<div class="day-details">'
        +'<div class="day-item"><span class="dl">еЈІдёҠ</span><span class="dv mono">'+yen(d.sales)+'</span></div>'
        +'<div class="day-item"><span class="dl">еәғе‘ҠиІ»</span><span class="dv mono">'+yen(d.adCost)+'</span></div>'
        +'<div class="day-item"><span class="dl">жүӢж•°ж–ҷ</span><span class="dv mono">'+yen(d.cardFee)+'</span></div>'
        +'<div class="day-item"><span class="dl">COиІ»з”Ё</span><span class="dv mono">'+yen(d.coFee||0)+'</span></div>'
        +'<div class="day-item"><span class="dl">жң¬дҪ“д»Ј</span><span class="dv mono">'+yen(d.honntai)+'</span></div>'
        +'<div class="day-item"><span class="dl">дјқзҘЁд»Ј</span><span class="dv mono">'+yen(d.slipCost)+'</span></div>'
        +'</div>';}
      else if(!hasD){html+='<div class="day-empty">гғҮгғјгӮҝгҒӘгҒ—</div>';}
      html+='</div>';
    });
    // Total card
    var t2=w.totals;
    html+='<div class="day-card total"><div class="day-top"><div><span class="day-date">еҗҲиЁҲ</span><span class="day-count">'+t2.count+'д»¶</span></div><div class="day-reward '+(t2.reward>=0?'pos':'neg')+' mono">'+yen(t2.reward)+'</div></div>';
    if(full){html+='<div class="day-details">'
      +'<div class="day-item"><span class="dl">еЈІдёҠ</span><span class="dv mono">'+yen(t2.sales)+'</span></div>'
      +'<div class="day-item"><span class="dl">еәғе‘ҠиІ»</span><span class="dv mono">'+yen(t2.adCost)+'</span></div>'
      +'<div class="day-item"><span class="dl">жүӢж•°ж–ҷ</span><span class="dv mono">'+yen(t2.cardFee)+'</span></div>'
      +'<div class="day-item"><span class="dl">COиІ»з”Ё</span><span class="dv mono">'+yen(t2.coFee||0)+'</span></div>'
      +'<div class="day-item"><span class="dl">жң¬дҪ“д»Ј</span><span class="dv mono">'+yen(t2.honntai)+'</span></div>'
      +'<div class="day-item"><span class="dl">дјқзҘЁд»Ј</span><span class="dv mono">'+yen(t2.slipCost)+'</span></div>'
      +'</div>';}
    html+='</div></div>';

    html+='</div>';});return html}

function handleErr(msg){msg=msg||'гӮЁгғ©гғј';if(msg.indexOf('еҶҚгғӯгӮ°гӮӨгғі')!==-1||msg.indexOf('гӮ»гғғгӮ·гғ§гғі')!==-1||msg.indexOf('жңҹйҷҗ')!==-1){toast(msg);setTimeout(resetLogin,1200);return}$('appErr').textContent=msg}
function resetLogin(){token='';currentData=null;isAdmin=false;myStaffId='';viewStaffId='';activeTab='own';$('pin').value='';$('appView').style.display='none';$('loginView').style.display='flex';$('loginErr').classList.remove('on');$('appErr').textContent='';$('weeksArea').innerHTML='';$('summaryArea').innerHTML='';$('tabBar').innerHTML='';$('adminSelect').style.display='none'}
