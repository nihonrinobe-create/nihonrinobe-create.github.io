<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務ポータル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3348;
  --text: #e8eaf0;
  --text2: #8b90a5;
  --accent: #4f8cff;
  --accent2: #3b6fd4;
  --green: #34d399;
  --green-bg: rgba(52,211,153,.12);
  --red: #f87171;
  --red-bg: rgba(248,113,113,.12);
  --orange: #fbbf24;
  --orange-bg: rgba(251,191,36,.12);
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,.12);
  --cyan: #22d3ee;
  --cyan-bg: rgba(34,211,238,.12);
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,.3);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px; color: #fff;
}
.header-title { font-size: 18px; font-weight: 600; letter-spacing: .02em; }
.header-user {
  font-size: 13px; color: var(--text2);
  background: var(--surface2); padding: 6px 14px; border-radius: 20px;
}

.controls {
  padding: 16px 24px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.controls label { font-size: 13px; color: var(--text2); }
.controls input[type="date"] {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 8px 12px; border-radius: 8px;
  font-family: 'Noto Sans JP', sans-serif; font-size: 14px; outline: none;
}
.controls input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(1); cursor: pointer; opacity: 0.8;
}
.controls input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
.controls input[type="date"]:focus { border-color: var(--accent); }

.view-select {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 8px 12px; border-radius: 8px;
  font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
  outline: none; cursor: pointer; min-width: 140px;
}
.view-select:focus { border-color: var(--accent); }

.date-row { display: flex; align-items: center; gap: 8px; }

.btn {
  background: var(--accent); color: #fff; border: none;
  padding: 8px 20px; border-radius: 8px; font-size: 14px;
  font-weight: 500; cursor: pointer; transition: background .2s;
}
.btn:hover { background: var(--accent2); }
.btn-ghost {
  background: transparent; border: 1px solid var(--border); color: var(--text2);
}
.btn-ghost:hover { border-color: var(--text2); color: var(--text); background: var(--surface2); }

.kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px; padding: 0 24px 16px;
}
.kpi {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
  transition: transform .15s, box-shadow .15s;
}
.kpi:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.kpi-label {
  font-size: 12px; color: var(--text2); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.kpi-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.kpi-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px; font-weight: 500; line-height: 1.1;
}
.kpi-unit { font-size: 14px; color: var(--text2); font-family: 'Noto Sans JP', sans-serif; margin-left: 2px; }

.section { padding: 0 24px 24px; }
.section-title {
  font-size: 15px; font-weight: 600; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::before {
  content: ''; width: 3px; height: 16px;
  background: var(--accent); border-radius: 2px;
}

.table-wrap {
  overflow-x: auto; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--surface);
}
table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
thead th {
  background: var(--surface2); padding: 10px 14px; text-align: left;
  font-weight: 500; color: var(--text2); font-size: 12px;
  border-bottom: 1px solid var(--border); position: sticky; top: 0;
}
tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: rgba(79,140,255,.04); }
.mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; }

.badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; }
.badge-green  { background: var(--green-bg);  color: var(--green); }
.badge-red    { background: var(--red-bg);    color: var(--red); }
.badge-orange { background: var(--orange-bg); color: var(--orange); }
.badge-purple { background: var(--purple-bg); color: var(--purple); }
.badge-cyan   { background: var(--cyan-bg);   color: var(--cyan); }

.revenue-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px; padding: 0 24px 24px;
}
.revenue-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
}
.revenue-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.revenue-value { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 500; }
.revenue-value.positive { color: var(--green); }
.revenue-value.negative { color: var(--red); }

.state-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; gap: 16px; color: var(--text2);
}
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top: 3px solid var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.auth-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px; max-width: 360px;
  width: 90%; text-align: center;
}
.auth-box h2 { font-size: 18px; margin-bottom: 16px; }
.auth-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 14px; border-radius: 8px;
  font-size: 14px; margin-bottom: 12px; outline: none;
  font-family: 'Noto Sans JP', sans-serif;
}
.auth-input:focus { border-color: var(--accent); }
.auth-error { color: var(--red); font-size: 13px; margin-bottom: 12px; display: none; }

@media (max-width: 640px) {
  .header { padding: 12px 16px; }
  .controls {
    padding: 12px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .controls .view-label { grid-column: 1 / -1; font-size: 13px; color: var(--text2); }
  .controls .view-select { grid-column: 1 / -1; }
  .controls .date-label { display: none; }
  .controls .date-row {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 8px;
  }
  .controls .date-row input[type="date"] { flex: 1; min-width: 0; }
  .controls .btn-update { grid-column: 1 / -1; }
  .controls .btn-reset { grid-column: 1 / -1; }
  .kpi-grid { padding: 0 16px 12px; grid-template-columns: 1fr 1fr; }
  .section { padding: 0 16px 16px; }
  .revenue-grid { padding: 0 16px 16px; }
  .kpi-value { font-size: 22px; }
}
</style>
</head>
<body>

<!-- ===== AUTH SCREEN ===== -->
<div id="authScreen" class="state-screen" style="display:none">
  <div class="auth-box">
    <div class="header-logo" style="margin:0 auto 16px;width:48px;height:48px;font-size:20px;">P</div>
    <h2>業務ポータル</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:20px;">
      担当者番号とトークンを入力してください
    </p>
    <input class="auth-input" id="authId" placeholder="担当者番号（例: 0001）">
    <input class="auth-input" id="authToken" type="password" placeholder="トークン">
    <div class="auth-error" id="authError"></div>
    <button class="btn" style="width:100%" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- ===== LOADING ===== -->
<div id="loadingScreen" class="state-screen" style="display:none">
  <div class="spinner"></div>
  <span>データを読み込み中...</span>
</div>

<!-- ===== MAIN ===== -->
<div id="mainScreen" style="display:none">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">P</div>
      <span class="header-title">業務ポータル</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="header-user" id="headerUser">---</div>
      <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px;" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <div class="controls">
    <label class="view-label">表示:</label>
    <select class="view-select" id="viewAsSelect" onchange="onViewAsChange()" style="display:none"></select>
    <label class="date-label">期間:</label>
    <div class="date-row">
      <input type="date" id="dateFrom">
      <span style="color:var(--text2)">〜</span>
      <input type="date" id="dateTo">
    </div>
    <button class="btn btn-update" onclick="reload()">更新</button>
    <button class="btn btn-ghost btn-reset" onclick="resetDates()">全期間</button>
  </div>

  <div class="kpi-grid" id="kpiGrid"></div>
  <div class="revenue-grid" id="revenueGrid"></div>

  <div class="section" id="staffSection" style="display:none">
    <div class="section-title">下請け別パフォーマンス</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>担当者</th><th>受付</th><th>成約</th><th>失注</th>
            <th>電話失注</th><th>予約</th><th>成約率</th><th>売上</th>
            <th>広告費</th><th>粗利</th><th>報酬見込</th>
          </tr>
        </thead>
        <tbody id="staffBody"></tbody>
      </table>
    </div>
  </div>

  <div class="section">
    <div class="section-title">案件一覧（直近）</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>案件番号</th><th>日付</th><th>ステータス</th>
            <th>お客様</th><th>内容</th><th>売上</th><th>備考</th>
          </tr>
        </thead>
        <tbody id="caseBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyWAsYrvJs4ihH046NL-tIzUBsPM7rOdm0MSdKjptR9KliR6Et0SvS_2z_egd4I7476FQ/exec';

var STATE = { id: '', token: '', data: null, viewAs: '' };

window.addEventListener('DOMContentLoaded', function() {
  show('authScreen');
});

function doLogin() {
  var id    = document.getElementById('authId').value.trim();
  var token = document.getElementById('authToken').value.trim();
  if (!id || !token) { showAuthError('IDとトークンを入力してください'); return; }
  STATE.id = id;
  STATE.token = token;
  STATE.viewAs = '';
  fetchData();
}

function showAuthError(msg) {
  var el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
}

function fetchData() {
  show('loadingScreen');
  document.getElementById('authError').style.display = 'none';

  var from = document.getElementById('dateFrom') ? document.getElementById('dateFrom').value : '';
  var to   = document.getElementById('dateTo')   ? document.getElementById('dateTo').value   : '';

  var params = '?mode=json'
    + '&id='    + encodeURIComponent(STATE.id)
    + '&token=' + encodeURIComponent(STATE.token);
  if (from) params += '&from=' + encodeURIComponent(from);
  if (to)   params += '&to='   + encodeURIComponent(to);
  if (STATE.viewAs) params += '&view_as=' + encodeURIComponent(STATE.viewAs);

  fetch(GAS_URL + params)
    .then(function(res) { return res.json(); })
    .then(function(json) {
      if (!json || !json.ok) {
        show('authScreen');
        showAuthError((json && json.error) || '認証エラー');
        return;
      }
      STATE.data = json;
      render(json);
      show('mainScreen');
    })
    .catch(function(err) {
      show('authScreen');
      showAuthError('通信エラー: ' + (err.message || err));
    });
}

function reload() { fetchData(); }

function resetDates() {
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  fetchData();
}

function onViewAsChange() {
  var sel = document.getElementById('viewAsSelect');
  STATE.viewAs = sel.value;
  fetchData();
}

function show(id) {
  ['authScreen','loadingScreen','mainScreen'].forEach(function(s) {
    document.getElementById(s).style.display = (s === id) ? '' : 'none';
  });
}

function doLogout() {
  STATE.id = '';
  STATE.token = '';
  STATE.data = null;
  STATE.viewAs = '';
  document.getElementById('authId').value = '';
  document.getElementById('authToken').value = '';
  show('authScreen');
}

function render(json) {
  var s = json.summary;
  var isAdmin = json.is_admin;

  document.getElementById('headerUser').textContent =
    json.staff_name + (isAdmin ? '（管理者）' : '');

  // --- ドロップダウン ---
  var sel = document.getElementById('viewAsSelect');
  var viewable = json.viewable || [];
  if (viewable.length > 1) {
    sel.style.display = '';
    sel.innerHTML = viewable.map(function(v) {
      var selected = (v.id === json.view_as) ? ' selected' : '';
      return '<option value="' + esc(v.id) + '"' + selected + '>' + esc(v.name) + '</option>';
    }).join('');
  } else {
    sel.style.display = 'none';
  }

  // --- KPI ---
  var kpis = [
    { label: '受付数',            value: s.total_received,   unit: '件', color: 'var(--text)',   dot: 'var(--text2)' },
    { label: '成約数',            value: s.seiyaku,          unit: '件', color: 'var(--green)',  dot: 'var(--green)' },
    { label: '失注数',            value: s.shicchu,          unit: '件', color: 'var(--red)',    dot: 'var(--red)' },
    { label: '電話失注数',        value: s.denwa_shicchu,    unit: '件', color: 'var(--orange)', dot: 'var(--orange)' },
    { label: '成約率',            value: s.seiyaku_rate_all, unit: '%',  color: 'var(--cyan)',   dot: 'var(--cyan)' },
    { label: '予約・保留',        value: (s.yoyaku||0) + (s.futsu||0), unit: '件', color: '#6b7280', dot: '#6b7280' }
  ];

  document.getElementById('kpiGrid').innerHTML = kpis.map(function(k) {
    return '<div class="kpi">'
      + '<div class="kpi-label"><span class="kpi-dot" style="background:' + k.dot + '"></span>' + k.label + '</div>'
      + '<div class="kpi-value" style="color:' + k.color + '">' + k.value + '<span class="kpi-unit">' + k.unit + '</span></div>'
      + '</div>';
  }).join('');

  // --- Revenue ---
  var revenueItems = [
    { label: '売上合計',   value: s.revenue,      positive: true },
    { label: '広告費合計', value: s.ad_cost,      positive: false },
    { label: '粗利',       value: s.gross_profit, positive: s.gross_profit >= 0 }
  ];

  var isViewingAll = isAdmin && (!json.view_as || json.view_as === STATE.id);
  if (isViewingAll && json.global_summary) {
    var gs = json.global_summary;
    var totalReward = 0;
    (gs.by_staff || []).forEach(function(st) { totalReward += st.reward; });
    revenueItems.push({ label: '報酬支払合計', value: totalReward, positive: false });
    revenueItems.push({ label: '会社手残り', value: gs.gross_profit - totalReward, positive: (gs.gross_profit - totalReward) >= 0 });
  } else {
    var myReward = 0;
    var viewTarget = json.view_as || STATE.id;
    (s.by_staff || []).forEach(function(st) {
      if (st.staff_id === viewTarget) myReward = st.reward;
    });
    revenueItems.push({ label: '報酬見込み', value: myReward, positive: true });
  }

  document.getElementById('revenueGrid').innerHTML = revenueItems.map(function(r) {
    var cls = r.positive ? 'positive' : (r.value < 0 ? 'negative' : '');
    return '<div class="revenue-card">'
      + '<div class="revenue-label">' + r.label + '</div>'
      + '<div class="revenue-value ' + cls + '">¥' + fmt(r.value) + '</div>'
      + '</div>';
  }).join('');

  // --- Staff Table (admin only) ---
  var staffSection = document.getElementById('staffSection');
  if (isAdmin && json.global_summary && json.global_summary.by_staff) {
    staffSection.style.display = '';
    document.getElementById('staffBody').innerHTML = json.global_summary.by_staff.map(function(st) {
      return '<tr>'
        + '<td><strong>' + esc(st.staff_name) + '</strong><br><span style="color:var(--text2);font-size:11px">' + esc(st.staff_id) + '</span></td>'
        + '<td class="mono">' + st.received + '</td>'
        + '<td class="mono" style="color:var(--green)">' + st.seiyaku + '</td>'
        + '<td class="mono" style="color:var(--red)">' + st.shicchu + '</td>'
        + '<td class="mono" style="color:var(--orange)">' + st.denwa_shicchu + '</td>'
        + '<td class="mono" style="color:var(--purple)">' + st.yoyaku + '</td>'
        + '<td class="mono">' + st.seiyaku_rate + '%</td>'
        + '<td class="mono">¥' + fmt(st.revenue) + '</td>'
        + '<td class="mono">¥' + fmt(st.ad_cost) + '</td>'
        + '<td class="mono" style="color:' + (st.gross_profit >= 0 ? 'var(--green)' : 'var(--red)') + '">¥' + fmt(st.gross_profit) + '</td>'
        + '<td class="mono">¥' + fmt(st.reward) + '</td>'
        + '</tr>';
    }).join('');
  } else {
    staffSection.style.display = 'none';
  }

  // --- Case Table ---
  var caseRows = (json.rows || []).slice().reverse().slice(0, 100);
  document.getElementById('caseBody').innerHTML = caseRows.length ? caseRows.map(function(r) {
    return '<tr>'
      + '<td class="mono" style="font-size:12px">' + esc(r.case_id) + '</td>'
      + '<td>' + esc(r.date) + '</td>'
      + '<td>' + statusBadge(r.status) + '</td>'
      + '<td>' + esc(r.customer) + '</td>'
      + '<td>' + esc(r.equipment) + '</td>'
      + '<td class="mono">¥' + fmt(r.today_total) + '</td>'
      + '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">' + esc(r.memo) + '</td>'
      + '</tr>';
  }).join('') : '<tr><td colspan="7" style="text-align:center;color:var(--text2);padding:24px">データがありません</td></tr>';
}

function fmt(n) {
  if (n == null || isNaN(n)) return '0';
  return Math.floor(n).toLocaleString('ja-JP');
}
function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function statusBadge(st) {
  var cls = 'badge ';
  if (st.indexOf('完工') > -1)       cls += 'badge-green';
  else if (st === '電話失注')         cls += 'badge-orange';
  else if (st === '失注')             cls += 'badge-red';
  else if (st.indexOf('予約') > -1)   cls += 'badge-purple';
  else if (st === 'キャンセル')       cls += 'badge-red';
  else if (st === '不通・保留')       cls += 'badge-cyan';
  else                                cls += 'badge-cyan';
  return '<span class="' + cls + '">' + esc(st) + '</span>';
}
</script>
<style>.header { padding-right: 64px; }</style>
<script src="https://nihonrinobe-create.github.io/shared-nav.js"></script>
</body>
</html>
